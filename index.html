<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Email Brain — your inbox, as your agent sees it</title>
  <link rel="stylesheet" href="styles.css?v=9">
  <script>
    // EMERGENCY iOS ZOOM BLOCKER - runs before anything else
    (function() {
      'use strict';
      
      // Block all multi-touch gestures (pinch-zoom)
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive: false, capture: true });
      
      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, { passive: false, capture: true });
      
      // Block gesture events (iOS pinch)
      document.addEventListener('gesturestart', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, { capture: true });
      
      document.addEventListener('gesturechange', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, { capture: true });
      
      document.addEventListener('gestureend', function(e) {
        e.preventDefault();
        e.stopPropagation();
      }, { capture: true });
      
      // Prevent double-tap zoom
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
    })();
  </script>
</head>
<body>
  <canvas id="brain"></canvas>

  <header class="overlay-header">
    <h1>Email Brain</h1>
    <p>Your inbox, as your agent sees it. Click a node.</p>
  </header>

  <aside id="detail-card" class="detail-card hidden" aria-live="polite">
    <button id="detail-close" class="detail-close" type="button" aria-label="Close">&times;</button>
    <p id="detail-kicker" class="detail-kicker"></p>
    <h2 id="detail-title" class="detail-title"></h2>
    <p id="detail-sub" class="detail-sub"></p>
    <div id="detail-links" class="detail-links"></div>
  </aside>

  <footer class="overlay-footer">
    <div id="legend" class="legend"></div>
    <p class="hint">drag nodes &middot; pinch / scroll to zoom &middot; drag background to pan</p>
  </footer>

  <script>
    // Set CSS zoom counteraction variable
    function updateZoomCounteraction() {
      const vv = window.visualViewport;
      if (vv) {
        document.documentElement.style.setProperty('--page-zoom', vv.scale);
      }
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', updateZoomCounteraction);
      updateZoomCounteraction();
    }
  </script>
  <script src="data.js?v=9"></script>
  <script src="graph.js?v=9"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Email Brain — your inbox, as your agent sees it</title>
  <link rel="stylesheet" href="styles.css?v=7">
  <script>
    // Emergency iOS zoom prevention - runs before anything else
    (function() {
      // Prevent double-tap zoom
      var lastTouchEnd = 0;
      document.addEventListener('touchend', function(e) {
        var now = Date.now();
        if (now - lastTouchEnd <= 300) {
          e.preventDefault();
        }
        lastTouchEnd = now;
      }, { passive: false });
      
      // Force reset zoom if it happens
      window.addEventListener('resize', function() {
        if (document.documentElement.scrollTop !== 0 || document.documentElement.scrollLeft !== 0) {
          window.scrollTo(0, 0);
        }
      });
    })();
  </script>
</head>
<body>
  <canvas id="brain"></canvas>

  <header class="overlay-header">
    <h1>Email Brain</h1>
    <p>Your inbox, as your agent sees it. Click a node.</p>
  </header>

  <aside id="detail-card" class="detail-card hidden" aria-live="polite">
    <button id="detail-close" class="detail-close" type="button" aria-label="Close">&times;</button>
    <p id="detail-kicker" class="detail-kicker"></p>
    <h2 id="detail-title" class="detail-title"></h2>
    <p id="detail-sub" class="detail-sub"></p>
    <div id="detail-links" class="detail-links"></div>
  </aside>

  <footer class="overlay-footer">
    <div id="legend" class="legend"></div>
    <p class="hint">drag nodes &middot; pinch / scroll to zoom &middot; drag background to pan</p>
  </footer>

  <script src="data.js?v=7"></script>
  <script src="graph.js?v=7"></script>
</body>
</html>
